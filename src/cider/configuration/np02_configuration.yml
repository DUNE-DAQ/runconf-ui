# Triggers
TriggerMap:
  TPG Enabled CRP 4 and 5:
    subsystems:
      - id: tp_generation_enabled
        type: attribute
        class: ReadoutApplication
        affected_objects: [runp02srv001eth0, runp02srv003eth1]
        enabled_state: true
        disabled_state: false
      - id: tp_generation_enabled
        type: attribute
        class: ReadoutApplication
        affected_objects: [runp02srv002eth0, runp02srv003eth0]
        enabled_state: true
        disabled_state: false
  
      
    enabled: true

  TPG Enabled APA:
    subsystems:
      - id: tp_generation_enabled
        type: attribute
        class: ReadoutApplication
        affected_objects: [runp04srv031eth00, runp04srv031eth01, runp04srv031eth10, runp04srv031eth11]
        enabled_state: true
        disabled_state: false
    enabled: true

  TPG Enabled PDS:
    subsystems:
      - id: tp_generation_enabled
        type: attribute
        class: ReadoutApplication
        affected_objects: [runp04srv026flx4]
        enabled_state: true
        disabled_state: false
    enabled: true

