General:
  configuration: "sessions/np02-session.data.xml"
  download_directory: "run_configs"
  use_path: False
  default_config: "np02-session.data.xml"

PanelOptions:

  Detector:
    label: "detector"
    view_panel: "Detector View"
    panel_type: "multisystem"

    Systems:
      - TPC:
          top_level_segment: "root-segment"

          components:
            # - id: tpc-segment
            #   class: segment

            - id: crp4-segment
              class: Segment
              system_label: TPC CRP4
              separate_system: True

            - id: crp5-segment
              class: Segment
              system_label: TPC CRP5
              separate_system: True


      - PDS:
          top_level_segment: "pds-segment"

          components:
            - id: pds-segment
              class: Segment

  # Dataflow
  Dataflow:
    label: "dataflow"
    panel_type: "singlesystem"
    classes:
      - "DFApplication"


  Trigger:
    label: "trigger"
    view_panel: "Trigger View"
    panel_type: "multisystem"


    Systems:
      - TPC TPG:
          top_level_segment: "crp4-segment"
      
          attributes:
              - id: tp_generation_enabled
                class: ReadoutApplication

              - id: ta_generation_enabled
                class: ReadoutApplication

          components:
            - id: tc-maker-tpc
              class: TriggerApplication
            - id: tp-stream-writer
              class: TPStreamWriterApplication

      - PDS TPG:
          top_level_segment: "pds-segment"

          attributes:
              - id: tp_generation_enabled
                class: ReadoutApplication
    
              - id: ta_generation_enabled
                class: ReadoutApplication

