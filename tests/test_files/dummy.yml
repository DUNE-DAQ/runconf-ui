# Dummy config for testing purposes with daqsystem-test
Settings:
  classes_to_show:
    - Segment
    - SmartDaqApplication


PanelOptions:
  Detector:
    label: "detector"
    view_panel: "Detector View"

    Systems:
      - Readout:
          subsystem_dependent: True
          display_full_system: True
          components:
            - id: ru-segment
              class: Segment
            - id: ru-01
              class: ReadoutApplication
              system_label: ru-01
              separate_system: True
            - id: ru-02
              class: ReadoutApplication
              system_label: ru-02
              separate_system: True

  TPG:
    label: "TPG"
    view_panel: "TPG View"

    Systems:
      - TPG:
          subsystem_dependent: True
          display_full_system: True
          components:
            - id: tp-stream-writer
              class: TPStreamWriterApplication

          attributes:
            - id: tp_generation_enabled
              segments: ["ru-segment"]
              class: ReadoutApplication
              separate_system: True
              system_label: "readout"
          
  Trigger:
    label: 'Trigger'
    view_panel: "Trigger View"
    Systems:
      - RandomTrigger:
          relationships:
            - id: standalone_candidate_maker_confs
              class: MLTApplication
              segments: ['trg-segment']
              relationship_class: RandomTCMakerConf
              enabled_state: [random-tc-generator]
              disabled_state: []
              tooltip: "Enable/Disable random trigger"

  NotReal:
    label: 'NotReal'
    view_panel: "NotReal View"
    Systems:
      - RandomTrigger:
          components:
            - id: not_real
              class: not_a_class

          attributes:
            - id: not_real
              segments: [not_a_segment]
              class: not_a_class

          relationships:
            - id: not_real
              segments: [not_a_segment]
              class: not_a_class
              enabled_state: [doesnt_exist]
              disabled_state: []
              relationship_class: not_a_class


AdjustableAttributes:
  Random Trigger Rates:
    label: "TriggerRates"
    Systems:
      - object_id: "random-tc-generator"
        object_class: RandomTCMakerConf
        attribute_name: "trigger_rate_hz"
        unit_label: "Hz"
